<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맵 번호 확인</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #333;
      color: white;
      font-size: 3rem;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="map-number">로딩 중...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mapIndex = parseInt(params.get('map'));

    const display = document.getElementById('map-number');

    if (mapIndex === 1 || mapIndex === 2 || mapIndex === 3) {
      display.textContent = `맵 ${mapIndex}`;
    } else {
      display.textContent = '잘못된 맵 번호입니다.';
    }
  </script>
</body>
</html>
