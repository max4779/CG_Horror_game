<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맵 선택</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  z-index: 10;
  background-color: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 40px;
  box-sizing: border-box;
}

#overlay h1 {
  color: white;
  font-size: 2rem;
  margin-bottom: 30px;
  text-shadow: 0 0 5px black;
}

.image-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 60vh; /* 더 크게 조정 */
  margin-bottom: 50px;
  background-color: black;
}

#main-image {
  max-height: 100%;
  max-width: 100%;
  object-fit: contain;
}

.map-buttons {
  display: flex;
  justify-content: center;
  gap: 40px; /* 간격도 약간 좁힘 */
  margin-top: -80px; /* 위로 올림 */
}

.map-box {
  width: 140px;
  height: 140px;
  background-color: rgba(116, 98, 98, 0.973);
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1.1rem;
  color: black;
  text-align: center;
}

.map-box:hover {
  transform: scale(1.05);
}



    #three-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #interaction-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      color: white;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 10px;
      display: none;
      z-index: 30;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: none;
      opacity: 0;
    }

      #fadeOverlay {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: white;
        opacity: 0;
        pointer-events: none;
        transition: opacity 2s ease;
        z-index: 9999;
      }

      #clearText {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 3em;
        color: black;
        opacity: 0;
        transition: opacity 1s ease;
        z-index: 10000;
      }
  </style>
</head>

    function showOverlay() {

          const exit = document.exitPointerLock?.();
          if (exit instanceof Promise) {
            exit.catch(() => {});

        } catch (e) {
          console.warn("PointerLock 해제 중 오류:", e.message);
        }
      }

      // 카메라 컨트롤 비활성화
      if (typeof controls !== 'undefined' && controls) {
        controls.enabled = false;
      }

      if (typeof scene !== 'undefined' && scene && typeof scene.traverse === 'function') {

      function disposeModel(model) {
        model.traverse((child) => {
          if (child.isMesh) {
            if (child.geometry) child.geometry.dispose();
            if (child.material) {
              if (Array.isArray(child.material)) {
                child.material.forEach((mat) => mat.dispose());
              } else {
                child.material.dispose();
              }
            }
          }
        });
      }
      function clearSceneModels() {
        scene.children.slice().forEach((obj) => {
          if (obj !== camera && obj !== light && obj !== playerMesh) {
            disposeModel(obj);
            scene.remove(obj);

        });

      const movementX = e.movementX || 0
      const movementY = e.movementY || 0

      yaw -= movementX * 0.002
      pitch -= movementY * 0.002

      const maxPitch = Math.PI / 2 - 0.01
      const minPitch = -Math.PI / 2 + 0.01
      pitch = Math.max(minPitch, Math.min(maxPitch, pitch))

      const direction = new THREE.Vector3(
        Math.cos(pitch) * Math.sin(yaw),
        Math.sin(pitch),
        Math.cos(pitch) * Math.cos(yaw)
      )
      camera.lookAt(camera.position.clone().add(direction))

    const sound = footstepSounds[footstepIndex].cloneNode()
    sound.play().catch(err => console.warn('발소리 재생 실패:', err))
    footstepIndex = (footstepIndex + 1) % footstepSounds.length
  }

  function isMoving() {
    return moveState.forward || moveState.backward || moveState.left || moveState.right
  }

  function footstepLoop(currentTime) {
    requestAnimationFrame(footstepLoop)

    if (isMoving()) {

      if (moveState.run) {
        footstepDelay = 300  // 달리기 시 발소리 간격을 더 빠르게 설정
      } else {
        footstepDelay = 600  // 걷기 시 발소리 간격
      }
      // 발소리 텀 체크
      if (currentTime - lastFootstepTime >= footstepDelay) {
        playFootstepSound()
        lastFootstepTime = currentTime
      }
    } else {
      // 이동 중이 아니면 타이머 리셋
      lastFootstepTime = currentTime
    }
  }

    light.position.copy(positionVector);
    scene.add(light);
    blinkingLights.push(light);

    let lightOn = true;
    const interval = setInterval(() => {
      lightOn = !lightOn;
      light.intensity = lightOn ? 0.1 : 0;
    }, 500);
    blinkIntervals.push(interval);
  }

    blinkIntervals.forEach(id => clearInterval(id));
    blinkIntervals = [];
  }

      color: 0xffcc88,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(positionVector);

    scene.add(mesh);

    // 빛나고 크기가 살짝 흔들리는 애니메이션
    function flicker() {
      const intensity = 1 + (Math.random() - 0.5) * 0.3;
      Plight.intensity = THREE.MathUtils.clamp(intensity, 1.0, 1.5);

      // 투명도와 크기도 같이 흔들기
      material.opacity = 0.7 + Math.random() * 0.3;

      const scale = 4 + Math.random() * 0.3;
      mesh.scale.set(scale, scale, 0.1);

      requestAnimationFrame(flicker);
    }
    flicker();
  }

  function updateCameraPosition() {
    const baseSpeed= 0.02
    let runSpeed =1.6
    if(stopChap1){
      runSpeed=2
    }
    else{
      runSpeed=1.6
    }
    const speed = moveState.run ? baseSpeed * runSpeed : baseSpeed;
    const dir = new THREE.Vector3()
    const right = new THREE.Vector3()
    const up = new THREE.Vector3(0, 1, 0)

    camera.getWorldDirection(dir)
    dir.y = 0
    dir.normalize()

    right.crossVectors(dir, up).normalize()

    const move = new THREE.Vector3()

    if(moveState.forward) move.add(dir)
    if(moveState.backward) move.sub(dir)
    if(moveState.left) move.sub(right)
    if(moveState.right) move.add(right)
    if(moveState.up) move.y += 1
    if(moveState.down) move.y -= 1

    if(move.length() === 0) return

    move.normalize().multiplyScalar(speed)

    const nextPos = camera.position.clone().add(move)
    playerMesh.position.copy(nextPos)

    // Raycaster 설정
    raycaster.set(camera.position, move.clone().normalize())

    const collisionObjects = []
    scene.traverse((obj) => {
      if(obj.isMesh && obj !== playerMesh) collisionObjects.push(obj)
    })

    const intersects = raycaster.intersectObjects(collisionObjects, true)

    
    if(intersects.length > 0 && intersects[0].distance < collisionDistance) {
      const collisionNormal = intersects[0].face.normal.clone()
      intersects[0].object.localToWorld(collisionNormal)

      // 이동 벡터에서 법선 성분 제거 (슬라이딩 벡터 계산)
      const moveDir = move.clone().normalize()
      const dot = moveDir.dot(collisionNormal)
      const slideDir = moveDir.clone().sub(collisionNormal.clone().multiplyScalar(dot)).normalize()

      // 슬라이딩 벡터 크기는 속도와 같게 유지
      const slideMove = slideDir.multiplyScalar(speed)

      // 새로운 위치 계산
      const slideNextPos = camera.position.clone().add(slideMove)

      // 슬라이딩 위치로 playerMesh 이동 (중복 이동 방지용)
      playerMesh.position.copy(slideNextPos)
      camera.position.copy(slideNextPos)
    } else {
      // 충돌 없으면 평소 이동
      camera.position.copy(nextPos)
      playerMesh.position.copy(nextPos)
    }
  }

        const delta = clock.getDelta();
        if (mixer && moveStarted) mixer.update(delta);

        if (isInClearZone(camera.position) && !lastFlag) {
          triggerClearEvent();
        }

        renderer.render(scene, camera);
      }

      renderLoop();
    }




  </script>
</body>
